#-- ./rustfmt.toml

# Formatting preferences for the BitNode Console workspace.
# Keep code readable, consistent, and aligned with modern Rust style.
edition = "2024"
max_width = 100
hard_tabs = false
use_small_heuristics = "Default"
indent_style = "Block"
newline_style = "Auto"
trim_multiline_strings = true
normalize_comments = true
reorder_imports = true
reorder_modules = true
struct_field_align_threshold = 20
match_arm_blocks = true
match_block_trailing_comma = true

# Prefer configurable spacing for chained method calls and field initialisation.
chain_width = 80
# Preserve one-line blocks where they improve readability.
allow_single_line_if_else = true

# Style for imports and attributes.
merge_imports = true
format_code_in_doc_comments = true

# Keep formatter stable across tools and CI.
verbose = false

# Rust 2024 edition defaults: use `..` for field init shorthand and modern formatting.
